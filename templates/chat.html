<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🕉 AI Hindu Chat</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>🕉 AI Hindu Chat</h1>

    <form action="/chat" method="POST">

        <input
            type="text"
            id="question"
            name="question"
            placeholder="अपना प्रश्न लिखें..."
            required>

        <br><br>

        <button type="submit">
            💬 पूछें
        </button>

        <button type="button"
                onclick="startListening()">
            🎤 Voice
        </button>

        <button type="button"
                onclick="speakAnswer()">
            🔊 Listen
        </button>

        <button type="button"
                onclick="pauseVoice()">
            ⏸ Pause
        </button>

        <button type="button"
                onclick="stopVoice()">
            ⏹ Stop
        </button>

    </form>

    {% if answer %}

    <div class="card"
         style="margin-top:30px;">

        <h2>🤖 AI उत्तर</h2>

        <p id="answer"
           style="font-size:20px;
                  line-height:1.8;
                  white-space:pre-line;">

            {{ answer }}

        </p>

    </div>

    {% endif %}

    <br>

    <a href="/">
        ⬅ Back to Home
    </a>

</div>

<script>

let speech;

// ===============================
// Voice Input
// ===============================

function startListening(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){

        alert("Speech Recognition उपलब्ध नहीं है");

        return;

    }

    const recognition =
        new SpeechRecognition();

    recognition.lang="hi-IN";

    recognition.continuous=false;

    recognition.interimResults=false;

    recognition.maxAlternatives=1;

    recognition.onresult=function(event){

        document.getElementById("question").value=
        event.results[0][0].transcript;

    };

    recognition.onerror=function(event){

        alert("Voice Error : "+event.error);

    };

    recognition.start();

}

// ===============================
// Speak AI Answer
// ===============================

function speakAnswer(){
alert("Listen button clicked");

    let answer=
    document.getElementById("answer");

    if(!answer){

        alert("पहले प्रश्न पूछें।");

        return;

    }

    speechSynthesis.cancel();

    speech=
    new SpeechSynthesisUtterance(
        answer.innerText
    );

    let voices=
    speechSynthesis.getVoices();

    for(let voice of voices){

        if(voice.lang.includes("hi")){

            speech.voice=voice;

            break;

        }

    }

    speech.lang="hi-IN";

    speech.rate=1;

    speech.pitch=1;

    speech.volume=1;

    speechSynthesis.speak(speech);

}

// ===============================
// Pause Voice
// ===============================

function pauseVoice(){

    speechSynthesis.pause();

}

// ===============================
// Stop Voice
// ===============================

function stopVoice(){

    speechSynthesis.cancel();

}

// ===============================
// Auto Speak
// ===============================

window.onload=function(){

    let answer=
    document.getElementById("answer");

    if(answer){

        speakAnswer();
        alert("JavaScript Loaded");

    }

};

</script>

<button onclick="alert('Test Button Works')">
    TEST
</button>

</body>
</html>
